<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Travelike">
  <meta name="theme-color" content="#07070f">
  <title>Travelike · Portal de Viajeros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%;background:#07070f}
    body{min-height:100%;background:#07070f;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-font-smoothing:antialiased}
    #root{min-height:100vh}
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
    input::placeholder,textarea::placeholder{color:#556677}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
    select option{background:#0f1824;color:#f0f4ff}
    #splash{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#07070f;flex-direction:column;gap:14px}
    #splash-logo{font-family:serif;font-size:40px;color:#00f0ff;letter-spacing:4px;font-weight:900}
    #splash-sub{color:#556677;font-size:11px;letter-spacing:6px;text-transform:uppercase}
  </style>
</head>
<body>
  <div id="root">
    <div id="splash">
      <div id="splash-logo">TRAVELIKE</div>
      <div id="splash-sub">Cargando…</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
