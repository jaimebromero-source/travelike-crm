
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Travelike">
  <meta name="theme-color" content="#07070f">
  <title>Travelike · Portal de Viajeros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%;background:#07070f}
    body{min-height:100%;background:#07070f;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-font-smoothing:antialiased}
    #root{min-height:100vh}
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
    input::placeholder,textarea::placeholder{color:#556677}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
    select option{background:#0f1824;color:#f0f4ff}
    #splash{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#07070f;flex-direction:column;gap:20px}
    #splash-logo{display:inline-flex;align-items:center;gap:12px}
    #splash-wordmark{font-family:'Anton',sans-serif;font-size:48px;line-height:1;letter-spacing:2px;text-shadow:0 0 32px rgba(0,240,255,0.35)}
    .sw{color:#ffffff}.sc{color:#00f0ff}
    #splash-sub{color:#556677;font-size:11px;letter-spacing:6px;text-transform:uppercase}
    #splash-dots{display:flex;gap:6px;align-items:center}
    #splash-dots span{width:5px;height:5px;border-radius:50%;background:#00f0ff;opacity:0.3;animation:pulse 1.2s ease-in-out infinite}
    #splash-dots span:nth-child(2){animation-delay:.2s}
    #splash-dots span:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
  </style>
</head>
<body>
  <div id="root">
    <div id="splash">
      <div id="splash-logo">
        <!-- Avión de papel — igual que en el componente TravelikeLogo -->
        <svg width="40" height="40" viewBox="0 0 36 36" fill="none">
          <polygon points="2,18 34,4 26,18 34,32" fill="none" stroke="#00f0ff" stroke-width="2.4" stroke-linejoin="round"/>
          <polyline points="26,18 14,22 16,30 20,24" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          <line x1="14" y1="22" x2="26" y2="18" stroke="#00f0ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        </svg>
        <div id="splash-wordmark"><span class="sw">TRAVE</span><span class="sc">LIKE</span></div>
      </div>
      <div id="splash-dots"><span></span><span></span><span></span></div>
      <div id="splash-sub">Cargando…</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
