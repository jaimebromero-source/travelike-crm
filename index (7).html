<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#07070f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TraveLike" />
    <meta name="description" content="Tu portal de viaje personal — TraveLike" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <title>TraveLike</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #07070f; }
    </style>

    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "a53d37c2-d328-48e0-84e4-1a3a71db77ad",
          // Apuntamos al sw.js propio que ya incluye la lógica de OneSignal
          serviceWorkerParam: { scope: "/" },
          serviceWorkerPath: "/sw.js",
          // No mostramos el prompt automático — lo hacemos nosotros desde NotifPrompt
          promptOptions: { autoPrompt: false }
        });
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- El SW lo registra OneSignal internamente, no hace falta registro manual -->
  </body>
</html>
